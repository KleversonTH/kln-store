<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLN STORE - Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #6c63ff;
    --text: #f0f0ff;
    --muted: #8888aa;
    --border: rgba(108,99,255,0.2);
    --card-border: rgba(255,255,255,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.2rem 2rem;
    background: rgba(10,10,15,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--text);
    text-decoration: none;
  }
  .logo span { color: var(--accent); }

  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
  }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 0.6rem;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus {
    border-color: rgba(108,99,255,0.5);
  }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.85rem;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }
  .btn-submit:hover { opacity: 0.85; }

  .erro {
    background: rgba(255,100,100,0.1);
    border: 1px solid rgba(255,100,100,0.3);
    color: #ff8080;
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }

  .sucesso {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    color: #4ade80;
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">KLN <span>STORE</span></a>
</nav>

<div class="container">
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="mostrarAba('login')">Entrar</button>
      <button class="tab" onclick="mostrarAba('cadastro')">Cadastrar</button>
    </div>

    <div id="msg-erro" class="erro"></div>
    <div id="msg-sucesso" class="sucesso"></div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••">
      </div>
      <button class="btn-submit" onclick="fazerLogin()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="form-cadastro" style="display:none">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="cadastro-nome" placeholder="Seu nome">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="cadastro-email" placeholder="seu@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="cadastro-senha" placeholder="••••••••">
      </div>
      <button class="btn-submit" onclick="fazerCadastro()">Criar conta</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';

  function mostrarAba(aba) {
    document.getElementById('form-login').style.display = aba === 'login' ? 'block' : 'none';
    document.getElementById('form-cadastro').style.display = aba === 'cadastro' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (aba === 'login' && i === 0) || (aba === 'cadastro' && i === 1));
    });
    limparMensagens();
  }

  function mostrarErro(msg) {
    const el = document.getElementById('msg-erro');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('msg-sucesso').style.display = 'none';
  }

  function mostrarSucesso(msg) {
    const el = document.getElementById('msg-sucesso');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('msg-erro').style.display = 'none';
  }

  function limparMensagens() {
    document.getElementById('msg-erro').style.display = 'none';
    document.getElementById('msg-sucesso').style.display = 'none';
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value;
    const senha = document.getElementById('login-senha').value;

    if (!email || !senha) return mostrarErro('Preencha todos os campos');

    try {
      const res = await fetch(`${API}/clientes/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });

      const data = await res.json();

      if (!res.ok) return mostrarErro(data.erro);

      localStorage.setItem('token', data.token);
      localStorage.setItem('cliente', JSON.stringify(data.cliente));
      window.location.href = 'index.html';
    } catch {
      mostrarErro('Erro ao conectar com o servidor');
    }
  }

  async function fazerCadastro() {
    const nome = document.getElementById('cadastro-nome').value;
    const email = document.getElementById('cadastro-email').value;
    const senha = document.getElementById('cadastro-senha').value;

    if (!nome || !email || !senha) return mostrarErro('Preencha todos os campos');

    try {
      const res = await fetch(`${API}/clientes/cadastro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha })
      });

      const data = await res.json();

      if (!res.ok) return mostrarErro(data.erro);

      mostrarSucesso('Conta criada! Faça login.');
      setTimeout(() => mostrarAba('login'), 1500);
    } catch {
      mostrarErro('Erro ao conectar com o servidor');
    }
  }
</script>

</body>
</html>
